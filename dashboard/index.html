<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POAM Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            color: #333;
        }

        header {
            background: #1a2a4a;
            color: white;
            padding: 20px 40px;
        }

        header h1 {
            font-size: 24px;
        }

        header p {
            font-size: 13px;
            opacity: 0.7;
            margin-top: 4px;
        }

        .stats {
            display: flex;
            gap: 16px;
            padding: 24px 40px;
        }

        .stat-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            flex: 1;
            border-left: 4px solid #ccc;
        }

        .stat-card.high {
            border-left-color: #e53e3e;
        }

        .stat-card.medium {
            border-left-color: #dd6b20;
        }

        .stat-card.low {
            border-left-color: #38a169;
        }

        .stat-card.total {
            border-left-color: #3182ce;
        }

        .stat-card h3 {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }

        .stat-card p {
            font-size: 32px;
            font-weight: bold;
            margin-top: 8px;
        }

        .table-container {
            margin: 0 40px 40px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        .table-header {
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-header h2 {
            font-size: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8f9fa;
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            color: #666;
            border-bottom: 1px solid #eee;
        }

        td {
            padding: 12px 16px;
            font-size: 14px;
            border-bottom: 1px solid #f0f0f0;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .badge.HIGH {
            background: #fff5f5;
            color: #e53e3e;
        }

        .badge.MEDIUM {
            background: #fffaf0;
            color: #dd6b20;
        }

        .badge.LOW {
            background: #f0fff4;
            color: #38a169;
        }

        .badge.OPEN {
            background: #ebf8ff;
            color: #3182ce;
        }

        .badge.CLOSED {
            background: #f0fff4;
            color: #38a169;
        }

        .control {
            background: #ebf8ff;
            color: #3182ce;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .refresh-btn {
            background: #1a2a4a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .refresh-btn:hover {
            background: #2a3a5a;
        }
    </style>
</head>

<body>

    <header>
        <h1>NIST RMF — POAM Dashboard</h1>
        <p>Automated Plan of Action & Milestones — AWS GRC Project</p>
    </header>

    <div class="stats">
        <div class="stat-card total">
            <h3>Total POAMs</h3>
            <p id="total">-</p>
        </div>
        <div class="stat-card high">
            <h3>High Risk</h3>
            <p id="high">-</p>
        </div>
        <div class="stat-card medium">
            <h3>Medium Risk</h3>
            <p id="medium">-</p>
        </div>
        <div class="stat-card low">
            <h3>Low Risk</h3>
            <p id="low">-</p>
        </div>
    </div>

    <div class="table-container">
        <div class="table-header">
            <h2>Open POAMs</h2>
            <button class="refresh-btn" onclick="loadPOAMs()">Refresh</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>POAM ID</th>
                    <th>Title</th>
                    <th>Control</th>
                    <th>Risk</th>
                    <th>Status</th>
                    <th>Due Date</th>
                    <th>Milestone</th>
                </tr>
            </thead>
            <tbody id="poam-table">
                <tr>
                    <td colspan="7" class="loading">Loading POAMs...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const API_URL = 'https://YOUR-API-GATEWAY-URL/dev/poams';

        async function loadPOAMs() {
            try {
                const response = await fetch(API_URL);
                const poams = await response.json();

                document.getElementById('total').textContent = poams.length;
                document.getElementById('high').textContent = poams.filter(p => p.risk_rating === 'HIGH').length;
                document.getElementById('medium').textContent = poams.filter(p => p.risk_rating === 'MEDIUM').length;
                document.getElementById('low').textContent = poams.filter(p => p.risk_rating === 'LOW').length;

                const tbody = document.getElementById('poam-table');
                if (poams.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="loading">No POAMs found</td></tr>';
                    return;
                }

                tbody.innerHTML = poams.map(p => `
        <tr>
          <td style="font-family: monospace; font-size: 11px;">${p.poam_id.substring(0, 8)}...</td>
          <td>${p.title}</td>
          <td><span class="control">${p.control_id}</span></td>
          <td><span class="badge ${p.risk_rating}">${p.risk_rating}</span></td>
          <td><span class="badge ${p.status}">${p.status}</span></td>
          <td>${p.scheduled_completion}</td>
          <td style="font-size: 12px; color: #666;">${p.milestone_1}</td>
        </tr>
      `).join('');

            } catch (error) {
                document.getElementById('poam-table').innerHTML =
                    '<tr><td colspan="7" class="loading">Error loading POAMs — check API URL</td></tr>';
            }
        }

        loadPOAMs();
    </script>

</body>

</html>
